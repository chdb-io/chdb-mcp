name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    name: Build and upload to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/chdb-mcp
    permissions:
      # Required for PyPI Trusted Publishing — no API token needs to be stored.
      # Configure the corresponding publisher under PyPI project Settings →
      # Publishing → Add a trusted publisher for the `chdb-io/chdb-mcp` repo.
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - name: Verify metadata
        run: |
          pip install twine
          twine check dist/*
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          print-hash: true
